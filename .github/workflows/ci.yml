name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    if: ${{ hashFiles('backend/**', 'jobs/**', 'workers/**', 'listeners/**') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./backend[dev]

      - name: Run Python tests
        env:
          PYTHONPATH: backend:.
        run: |
          TEST_PATHS=""
          [ -d backend/tests ] && TEST_PATHS="$TEST_PATHS backend/tests"
          [ -d jobs ] && TEST_PATHS="$TEST_PATHS jobs"
          [ -d workers ] && TEST_PATHS="$TEST_PATHS workers"
          [ -d listeners ] && TEST_PATHS="$TEST_PATHS listeners"

          if [ -n "$TEST_PATHS" ]; then
            pytest $TEST_PATHS
          else
            echo "No Python test paths found."
          fi

  frontend:
    if: ${{ hashFiles('frontend/**') != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Run frontend tests
        run: |
          cd frontend
          npm test